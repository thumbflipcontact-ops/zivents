workflows:
  react-native-android:
    name: React Native Android Release Build
    max_build_duration: 60
    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Android RELEASE APK
        script: |
          cd android

          # ✅ Create keystore (used for signing release build)
          keytool -genkey -v -keystore app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          # ✅ Fix permission issue
          chmod +x gradlew

          # ✅ BUILD RELEASE APK (IMPORTANT CHANGE)
          ./gradlew assembleRelease

    artifacts:
      - android/app/build/outputs/**/*.apk

  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install pods
        script: |
          cd ios && pod install && cd ..

      - name: Build iOS
        script: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme * \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $CM_BUILD_DIR/build/ios/archive.xcarchive archive

    artifacts:
      - android/app/build/outputs/**/*.apk
      - build/ios/archive.xcarchive