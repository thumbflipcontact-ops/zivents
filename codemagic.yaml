workflows:
  react-native-android:
    name: React Native Android Build
    max_build_duration: 60
    environment:
      node: 18

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/**/*.apk

  react-native-ios:
    name: React Native iOS Build
    max_build_duration: 60
    environment:
      node: 18
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Install pods
        script: |
          cd ios && pod install && cd ..

      - name: Build iOS
        script: |
          cd ios
          xcodebuild -workspace *.xcworkspace \
                     -scheme * \
                     -configuration Release \
                     -sdk iphoneos \
                     -archivePath $CM_BUILD_DIR/build/ios/archive.xcarchive archive

    artifacts:
      - build/ios/archive.xcarchive